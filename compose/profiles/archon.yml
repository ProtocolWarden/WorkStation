# =============================================================================
# WorkStation — Archon Profile
# =============================================================================
# Adds Archon to the running stack. Archon is the workflow harness OC
# dispatches to via ``runtime_kind="manual"`` (PR archon Phase 3).
#
# Build context: archon is a TypeScript/bun monorepo checked out as a
# sibling of WorkStation:
#
#   GitHub/
#     WorkStation/   ← this repo
#     Archon/        ← git clone git@github.com:Velascat/Archon.git
#
# Usage:
#   docker compose -f compose/docker-compose.yml \
#                  -f compose/profiles/core.yml \
#                  -f compose/profiles/archon.yml up -d
#
# Health: http://localhost:3000/api/health (or whatever PORT_ARCHON resolves to)
# =============================================================================

version: "3.9"

services:

  archon:
    build:
      context: ../../Archon
      dockerfile: Dockerfile
    image: archon:latest
    container_name: workstation-archon
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    ports:
      - "${PORT_ARCHON:-3000}:${PORT_ARCHON:-3000}"
    environment:
      ARCHON_DOCKER: "true"
      PORT: "${PORT_ARCHON:-3000}"
      # Source these from .env at the repo root if needed
      DATABASE_URL: "${ARCHON_DATABASE_URL:-}"
    volumes:
      # Persist archon state under workstation/runtime/archon
      - ../runtime/archon:/.archon
    networks:
      - platform
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -f http://localhost:${PORT_ARCHON:-3000}/api/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
