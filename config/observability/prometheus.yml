# Prometheus configuration for the WorkStation observability profile.
#
# Mounted into the prometheus container at /etc/prometheus/prometheus.yml
# by compose/profiles/observability.yml. Operators may hand-edit this
# file to add new scrape jobs as services expose /metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-scrape — proves the stack is alive.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Add WorkStation services as they expose /metrics. Examples:
  #
  # - job_name: 'switchboard'
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['workstation-switchboard:20401']
  #
  # - job_name: 'archon'
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['workstation-archon:3000']
