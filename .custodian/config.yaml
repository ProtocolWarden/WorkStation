repo_key: PlatformDeployment
src_root: tools
tests_root: test

# Minimum baseline — runs Custodian's generic C1-C8 only.
# PlatformDeployment has no `src/` — tracked Python lives under `tools/platform_deployment_cli/`.
# (The `runtime/` directory is a local artifact and is gitignored.)
# Add `plugins:` and `detectors:` here when this repo grows its own
# `_custodian/` overlay layer (see OperationsCenter for a worked example).

tools:
  ruff: true
  vulture: true
  # mypy/ty: enable when type annotations are stable
  # semgrep: true  # add rules/semgrep/ dir with custom rules to enable

# ---------------------------------------------------------------------------
# Privacy / boundary enforcement (Custodian B-class)
# ---------------------------------------------------------------------------
# Names listed here cause Custodian B1 to fail any tracked file that
# mentions them. Default excludes (.console/**, config/managed_repos/local/**,
# docs/history/**, tools/audit/report/**, .custodian/config.yaml itself)
# spare operator-private and historical surfaces.
privacy:
  require_boundary_artifact: true

# ---------------------------------------------------------------------------
# Audit: per-detector exclusions and tuning
# ---------------------------------------------------------------------------
audit:
  # PlatformDeployment docs frequently reference symbols and values that live in
  # OTHER repos (Archon, Kodo, OperationsCenter) since WS hosts adapter
  # integration documentation. These aren't phantoms — they're cross-repo
  # references. K1/K2 doesn't have cross-repo awareness yet.
  common_words:
    - artifacts
    - cancelled
    - check_support
    - error_text
    - goal_file_path
    - paused
    - abandoned
    - debug
    - failure_category
    - success
    - kodo_mode
    - output_text
    - provider
    - workflow_events
    - workspace_path
  known_values:
    - abandoned
    - debug
    - failure_category
    - paused
    - success
  # The CLI is exercised end-to-end (subprocess + filesystem state) by smoke
  # tests, not by name-importing each module. local_manifest.py + config.py
  # are the config-loading layer — they own the os.environ accesses.
  c13_allowed_paths:
    - "tools/platform_deployment_cli/local_manifest.py"
    - "tools/platform_deployment_cli/config.py"
  exclude_paths:
    T1:
      - "tools/platform_deployment_cli/**"
    T6:
      - "tools/platform_deployment_cli/**"
    T7:
      - "tools/platform_deployment_cli/**"
    T8:
      - test/unit/test_legacy_runtime_removal.py
      - test/unit/test_custodian_boundary_runner.py
    D3:
      # CLI mains exit via SystemExit / sys.exit() — they don't return.
      - tools/platform_deployment_cli/main.py
    D11:
      # cmd_lane_status / cmd_lane_health are sibling CLI commands sharing
      # the read-and-display shape — typology by class.
      - tools/platform_deployment_cli/lane_cli.py
